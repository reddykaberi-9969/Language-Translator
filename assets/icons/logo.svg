<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="fl-bg" x1="4" y1="3" x2="28" y2="29" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3730a3"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="10" fill="url(#fl-bg)"/>
  <!-- Overlapping language circles -->
  <circle cx="13" cy="16" r="7" stroke="#fff" stroke-width="2" fill="rgba(255,255,255,0.12)"/>
  <circle cx="19" cy="16" r="7" stroke="#fff" stroke-width="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Bridge arc -->
  <path
    d="M13 11.5c3.5-2 8.5-2 12 0"
    stroke="#fff"
    stroke-width="2"
    stroke-linecap="round"
    fill="none"
    opacity="0.5"
  />
  <!-- Fluent wave through overlap -->
  <path
    d="M8 17.5c2.2-2.4 4.8-2.4 7 0s4.8 2.4 7 0 4.8-2.4 7 0"
    stroke="#fff"
    stroke-width="2.3"
    stroke-linecap="round"
    fill="none"
  />
</svg>
